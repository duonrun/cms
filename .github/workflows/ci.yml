name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      CELEMAS_CMS_DB_HOST: localhost
      CELEMAS_CMS_DB_NAME: celemas
      CELEMAS_CMS_DB_USER: celemas
      CELEMAS_CMS_DB_PASSWORD: celemas
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.5'
          extensions: curl, dom, gd, intl, json, mbstring, pgsql, xml, zip
          coverage: xdebug

      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install packages with composer
        run: composer install

      - name: Run PHP lint checks
        run: composer lint

      - name: Run Markdown lint checks
        run: composer docs:lint
        env:
          npm_config_yes: 'true'

      - name: Start postgresql server and create test db
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER ${{ env.CELEMAS_CMS_DB_USER }} WITH PASSWORD '${{ env.CELEMAS_CMS_DB_PASSWORD }}' CREATEDB;"
          sudo -u postgres createdb --owner ${{ env.CELEMAS_CMS_DB_USER }} ${{ env.CELEMAS_CMS_DB_NAME }}

      - name: Initialize database schema
        run: php ./run db:migrations --apply

      - name: Run tests with coverage
        run: composer coverage:test

      - name: Analyze coverage
        run: composer coverage:analyze

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./.coverage/coverage.xml
          fail_ci_if_error: true
